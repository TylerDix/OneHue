<!DOCTYPE html>

<title>SVG Viewer</title>
<style>
  body { background: #1a1a1a; color: #fff; font-family: monospace; margin: 0; padding: 10px; }
  .controls { position: sticky; top: 0; background: #1a1a1a; padding: 8px; z-index: 10; border-bottom: 1px solid #444; }
  .controls button { background: #333; color: #fff; border: 1px solid #666; padding: 6px 14px; cursor: pointer; margin-right: 4px; }
  .controls button:hover { background: #555; }
  .controls span { margin: 0 12px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px 0; }
  .card { background: #222; border: 1px solid #444; border-radius: 4px; overflow: hidden; }
  .card img { width: 100%; aspect-ratio: 1; display: block; background: #111; }
  .card .label { padding: 3px 6px; font-size: 10px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .idx { color: #666; }
</style>

const basePath = '../One Hue/Artworks/';
const totalPages = Math.ceil(names.length / PER_PAGE);

function render() {
  const start = page * PER_PAGE;
  const end = Math.min(start + PER_PAGE, names.length);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = start; i < end; i++) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<img src="${basePath}${names[i]}.svg" onerror="this.style.background='red'"><div class="label"><span class="idx">${i+1}.</span> ${names[i]}</div>`;
    grid.appendChild(card);
  }
  document.getElementById('pageInfo').textContent = `Page ${page+1}/${totalPages}`;
  document.getElementById('rangeInfo').textContent = `(${start+1}-${end} of ${names.length})`;
}

function nextPage() { if (page < totalPages - 1) { page++; render(); } }
function prevPage() { if (page > 0) { page--; render(); } }
render();
</script>
