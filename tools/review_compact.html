<!DOCTYPE html>
<html><head><style>
body { background: #333; color: #fff; font-family: sans-serif; margin: 10px; }
.grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
.card { background: #222; border-radius: 4px; padding: 3px; }
.card h4 { margin: 0 0 2px 0; font-size: 8px; text-align: center; }
.card img { width: 100%; display: block; }
</style></head><body>
<h3>58 SVGs – Compact Review</h3>
<div class="grid" id="grid"></div>
<script>
const svgs = [
"alpineWildflowerMeadow","autumnDeer","bicycleFlowerBasket","coralReefTurtle","elephantSavanna",
"emptyClassroom","floodedDockTwilight","forestPuddleLeaves","hammockPalms","heronGoldenHour",
"heronMoonlitLake","hummingbirdGarden","ironBridgeMist","japanese","japanesePagoda",
"lantern2","lanternFestivalRiver","logCabinSmoke","lotusPondWater","mangroveHeron",
"mapleSeeds","moon","mossyWaterfall","mountain","nightTrainStars",
"northerlights","openPitMine","orcaBreaching","ospreyDive","peatlandStream",
"polarBearIce","redPandaBamboo","roseBouquetVase","rowboatShallows","saltFlatSolitude",
"seaStack","seaTurtleReef","shamrockRainbow","shipwreckCoral","shorebirdsFlats",
"snowyOwl","starFish","starlingMurmuration","stoneWallCoastline","stormPetrelSea",
"succulentGarden","sunflowerFieldSunset","tideLine","turtles","vineyardAutumnRiver",
"volcanoCraterLake","whaleTailOcean","wheatFieldGoldenHour","wildflowersRuins","windmillLavender",
"windowsillBottles","wolfSnow","wrenCactusSunset"
];
const grid = document.getElementById('grid');
svgs.forEach(n => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<h4>${n}</h4><img src="/One%20Hue/Artworks/${n}.svg">`;
  grid.appendChild(card);
});
</script>
</body></html>
