.card { background: #2a2a2a; border-radius: 8px; padding: 8px; text-align: center; }

.card.flagged { border: 2px solid #ff4444; }
.card.flagged .name { color: #ff6666; }
.controls { text-align: center; margin: 20px 0; }
.controls button { margin: 4px; padding: 8px 16px; border-radius: 4px; border: none; background: #444; color: white; cursor: pointer; }
.controls button.active { background: #0066cc; }
</style>

function render(items) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  items.forEach(a => {
    const card = document.createElement('div');
    card.className = 'card' + (a.flagged ? ' flagged' : '');
    card.dataset.format = a.format;
    card.innerHTML = `
      <img src="../One Hue/Artworks/${a.name}.svg" loading="lazy" onerror="this.style.background='#ff000033'">
      <div class="name">${a.name}</div>
      <div class="meta">${a.paths} paths | ${a.colors} colors | ${a.sizeK}K | ${a.format}</div>
      <div class="meta">${a.issues || 'OK'}</div>
    `;
    grid.appendChild(card);
  });
}

function filter(type) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (type === 'all') render(artworks);
  else if (type === 'flagged') render(artworks.filter(a => a.flagged));
  else if (type === 'cls') render(artworks.filter(a => a.format === 'cls'));
  else if (type === 'st') render(artworks.filter(a => a.format === 'st'));
}

render(artworks);
